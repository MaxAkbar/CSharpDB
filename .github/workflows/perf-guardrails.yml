name: Perf Guardrails

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/CSharpDB.Benchmarks/**"
      - ".github/workflows/perf-guardrails.yml"
  workflow_dispatch:
    inputs:
      fail_on_regression:
        description: "Fail run when guardrails are violated"
        required: false
        default: false
        type: boolean
      baseline_snapshot:
        description: "Optional baseline snapshot folder name (for example 20260302-001757)"
        required: false
        default: ""
        type: string
  schedule:
    - cron: "0 10 * * *"

jobs:
  perf-guardrails:
    runs-on: windows-latest
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Run Perf Guardrails PR Lane (Report)
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: |
          pwsh ./tests/CSharpDB.Benchmarks/scripts/Run-Perf-Guardrails.ps1 `
            -Configuration Release `
            -Mode pr `
            -NoFailOnRegression `
            -BaselineSnapshot "${{ inputs.baseline_snapshot }}"

      - name: Run Perf Guardrails Release Lane (Report)
        if: github.event_name != 'pull_request' && (github.event_name != 'workflow_dispatch' || inputs.fail_on_regression != true)
        shell: pwsh
        run: |
          pwsh ./tests/CSharpDB.Benchmarks/scripts/Run-Perf-Guardrails.ps1 `
            -Configuration Release `
            -Mode release `
            -NoFailOnRegression `
            -BaselineSnapshot "${{ inputs.baseline_snapshot }}"

      - name: Run Perf Guardrails Release Lane (Gate)
        if: github.event_name == 'workflow_dispatch' && inputs.fail_on_regression == true
        shell: pwsh
        run: |
          pwsh ./tests/CSharpDB.Benchmarks/scripts/Run-Perf-Guardrails.ps1 `
            -Configuration Release `
            -Mode release `
            -BaselineSnapshot "${{ inputs.baseline_snapshot }}"

      - name: Upload Perf Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-guardrails-${{ github.run_id }}
          path: |
            tests/CSharpDB.Benchmarks/results/perf-guardrails-last.md
            tests/CSharpDB.Benchmarks/results/perf-guardrails-run-logs/*.log
            BenchmarkDotNet.Artifacts/results/*.csv
            BenchmarkDotNet.Artifacts/*.log
