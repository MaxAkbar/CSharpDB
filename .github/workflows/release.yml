name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Guard legacy primitives identity
        shell: pwsh
        run: ./scripts/Test-NoLegacyCoreReferences.ps1

      - name: Restore
        run: dotnet restore CSharpDB.slnx

      - name: Build
        run: dotnet build CSharpDB.slnx -c Release --no-restore

      - name: Test
        run: dotnet test CSharpDB.slnx -c Release --no-build --verbosity minimal

  publish-nuget:
    name: Publish NuGet
    needs: build-and-test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Resolve version from tag
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          if [[ -z "$version" || "$version" == "$GITHUB_REF_NAME" ]]; then
            echo "Tag must start with v (for example v1.0.1)." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Fail when NUGET_API_KEY is missing
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$NUGET_API_KEY" ]]; then
            echo "Repository secret NUGET_API_KEY is not set." >&2
            exit 1
          fi

      - name: Rewrite README links for NuGet
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/fix-nuget-readme-links.sh
          scripts/fix-nuget-readme-links.sh "$GITHUB_REF_NAME" \
            src/CSharpDB/README.md \
            src/CSharpDB.Primitives/README.md \
            src/CSharpDB.Sql/README.md \
            src/CSharpDB.Storage/README.md \
            src/CSharpDB.Execution/README.md \
            src/CSharpDB.Engine/README.md \
            src/CSharpDB.Pipelines/README.md \
            src/CSharpDB.Data/README.md \
            src/CSharpDB.EntityFrameworkCore/README.md \
            src/CSharpDB.Storage.Diagnostics/README.md \
            src/CSharpDB.Client/README.md

      - name: Pack projects
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/nuget
          version="${{ steps.version.outputs.version }}"
          dotnet pack src/CSharpDB/CSharpDB.csproj -c Release -o artifacts/nuget -p:Version="$version"
          dotnet pack src/CSharpDB.Primitives/CSharpDB.Primitives.csproj -c Release -o artifacts/nuget -p:Version="$version"
          dotnet pack src/CSharpDB.Sql/CSharpDB.Sql.csproj -c Release -o artifacts/nuget -p:Version="$version"
          dotnet pack src/CSharpDB.Storage/CSharpDB.Storage.csproj -c Release -o artifacts/nuget -p:Version="$version"
          dotnet pack src/CSharpDB.Execution/CSharpDB.Execution.csproj -c Release -o artifacts/nuget -p:Version="$version"
          dotnet pack src/CSharpDB.Engine/CSharpDB.Engine.csproj -c Release -o artifacts/nuget -p:Version="$version"
          dotnet pack src/CSharpDB.Pipelines/CSharpDB.Pipelines.csproj -c Release -o artifacts/nuget -p:Version="$version"
          dotnet pack src/CSharpDB.Data/CSharpDB.Data.csproj -c Release -o artifacts/nuget -p:Version="$version"
          dotnet pack src/CSharpDB.EntityFrameworkCore/CSharpDB.EntityFrameworkCore.csproj -c Release -o artifacts/nuget -p:Version="$version"
          dotnet pack src/CSharpDB.Storage.Diagnostics/CSharpDB.Storage.Diagnostics.csproj -c Release -o artifacts/nuget -p:Version="$version"
          dotnet pack src/CSharpDB.Client/CSharpDB.Client.csproj -c Release -o artifacts/nuget -p:Version="$version"

      - name: Push packages to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          dotnet nuget push "artifacts/nuget/*.nupkg" \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/nuget/*.nupkg
          if-no-files-found: error

  native-aot:
    name: NativeAOT (${{ matrix.os }} ${{ matrix.rid }})
    needs: build-and-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            lib: CSharpDB.Native.so
          - os: windows-latest
            rid: win-x64
            lib: CSharpDB.Native.dll
          - os: macos-latest
            rid: osx-arm64
            lib: CSharpDB.Native.dylib

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install native toolchain (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Publish NativeAOT library
        run: dotnet publish src/CSharpDB.Native/CSharpDB.Native.csproj -c Release -r ${{ matrix.rid }}

      - name: Verify exported symbols (Linux)
        if: runner.os == 'Linux'
        run: nm -D src/CSharpDB.Native/bin/Release/net10.0/${{ matrix.rid }}/publish/${{ matrix.lib }} | grep -c csharpdb_

      - name: Verify exported symbols (macOS)
        if: runner.os == 'macOS'
        run: nm -gU src/CSharpDB.Native/bin/Release/net10.0/${{ matrix.rid }}/publish/${{ matrix.lib }} | grep -c csharpdb_

      - name: Verify exported symbols (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dumpbin = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest `
            -products * `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -find 'VC\Tools\MSVC\**\bin\Hostx64\x64\dumpbin.exe' |
            Select-Object -First 1

          if (-not $dumpbin) {
            throw "Could not locate dumpbin.exe from the installed Visual Studio toolchain."
          }

          & $dumpbin /exports src\CSharpDB.Native\bin\Release\net10.0\${{ matrix.rid }}\publish\${{ matrix.lib }} |
            Select-String "csharpdb_"

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: src/CSharpDB.Native/bin/Release/net10.0/${{ matrix.rid }}/publish/${{ matrix.lib }}
          if-no-files-found: error

      - name: Upload C header (once)
        if: matrix.rid == 'linux-x64'
        uses: actions/upload-artifact@v4
        with:
          name: native-header
          path: src/CSharpDB.Native/csharpdb.h
          if-no-files-found: error

  daemon-archives:
    name: Daemon Archives (${{ matrix.os }} ${{ matrix.rid }})
    needs: build-and-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            extension: tar.gz
            executable: CSharpDB.Daemon
          - os: windows-latest
            rid: win-x64
            extension: zip
            executable: CSharpDB.Daemon.exe
          - os: macos-latest
            rid: osx-arm64
            extension: tar.gz
            executable: CSharpDB.Daemon

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Publish daemon archive
        shell: pwsh
        run: ./scripts/Publish-CSharpDbDaemonRelease.ps1 -Runtime ${{ matrix.rid }} -OutputRoot artifacts/daemon-release

      - name: Verify daemon archive and smoke start
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          $archiveName = "csharpdb-daemon-v$version-${{ matrix.rid }}.${{ matrix.extension }}"
          $archivePath = Join-Path "artifacts/daemon-release/archives" $archiveName
          $checksumsPath = Join-Path "artifacts/daemon-release/archives" "SHA256SUMS.txt"

          if (-not (Test-Path -Path $archivePath)) {
            throw "Expected daemon archive was not created: $archivePath"
          }

          if (-not (Select-String -Path $checksumsPath -Pattern ([regex]::Escape($archiveName)) -Quiet)) {
            throw "Checksum file does not contain $archiveName."
          }

          $extractRoot = Join-Path $env:RUNNER_TEMP "csharpdb-daemon-extract"
          if (Test-Path -Path $extractRoot) {
            Remove-Item -LiteralPath $extractRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $extractRoot | Out-Null

          if ($archiveName.EndsWith('.zip', [StringComparison]::OrdinalIgnoreCase)) {
            Expand-Archive -Path $archivePath -DestinationPath $extractRoot -Force
          }
          else {
            & tar -xzf $archivePath -C $extractRoot
            if ($LASTEXITCODE -ne 0) {
              throw "tar extraction failed with exit code $LASTEXITCODE."
            }
          }

          $executablePath = Join-Path $extractRoot "${{ matrix.executable }}"
          if (-not (Test-Path -Path $executablePath)) {
            throw "Expected daemon executable was not found after extraction: $executablePath"
          }

          if (-not $IsWindows) {
            & chmod +x $executablePath
          }

          $outPath = Join-Path $env:RUNNER_TEMP "csharpdb-daemon-smoke.out.log"
          $errPath = Join-Path $env:RUNNER_TEMP "csharpdb-daemon-smoke.err.log"
          $dbPath = Join-Path $env:RUNNER_TEMP "csharpdb-daemon-smoke.db"
          $env:DOTNET_ENVIRONMENT = 'Production'
          $env:ASPNETCORE_ENVIRONMENT = 'Production'
          $env:ASPNETCORE_URLS = 'http://127.0.0.1:5820'
          $env:ConnectionStrings__CSharpDB = "Data Source=$dbPath"
          $env:CSharpDB__Daemon__EnableRestApi = 'true'

          $process = Start-Process `
            -FilePath $executablePath `
            -WorkingDirectory $extractRoot `
            -PassThru `
            -RedirectStandardOutput $outPath `
            -RedirectStandardError $errPath

          $info = $null
          $deadline = [DateTimeOffset]::UtcNow.AddSeconds(30)
          while ([DateTimeOffset]::UtcNow -lt $deadline) {
            if ($process.HasExited) {
              Write-Host "--- stdout ---"
              if (Test-Path $outPath) { Get-Content $outPath }
              Write-Host "--- stderr ---"
              if (Test-Path $errPath) { Get-Content $errPath }
              throw "Daemon smoke process exited early with code $($process.ExitCode)."
            }

            try {
              $info = Invoke-RestMethod -Uri 'http://127.0.0.1:5820/api/info' -TimeoutSec 2
              break
            }
            catch {
              Start-Sleep -Seconds 1
            }
          }

          if ($null -eq $info) {
            Write-Host "--- stdout ---"
            if (Test-Path $outPath) { Get-Content $outPath }
            Write-Host "--- stderr ---"
            if (Test-Path $errPath) { Get-Content $errPath }
            throw "Daemon REST smoke endpoint did not respond before the timeout."
          }

          if ([string]::IsNullOrWhiteSpace($info.dataSource)) {
            throw "Daemon REST smoke endpoint returned no dataSource."
          }

          $grpcSmokeRoot = Join-Path $env:RUNNER_TEMP "csharpdb-daemon-grpc-smoke"
          if (Test-Path -Path $grpcSmokeRoot) {
            Remove-Item -LiteralPath $grpcSmokeRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Path $grpcSmokeRoot | Out-Null

          $clientProjectPath = (Resolve-Path "src/CSharpDB.Client/CSharpDB.Client.csproj").Path
          $grpcSmokeProject = Join-Path $grpcSmokeRoot "CSharpDbDaemonGrpcSmoke.csproj"
          $grpcSmokeProgram = Join-Path $grpcSmokeRoot "Program.cs"

          @"
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <OutputType>Exe</OutputType>
              <TargetFramework>net10.0</TargetFramework>
              <ImplicitUsings>enable</ImplicitUsings>
              <Nullable>enable</Nullable>
            </PropertyGroup>
            <ItemGroup>
              <ProjectReference Include="$clientProjectPath" />
            </ItemGroup>
          </Project>
          "@ | Set-Content -Path $grpcSmokeProject -Encoding UTF8

          @"
          using CSharpDB.Client;

          await using var client = CSharpDbClient.Create(new CSharpDbClientOptions
          {
              Transport = CSharpDbTransport.Grpc,
              Endpoint = args[0],
          });

          var info = await client.GetInfoAsync();
          if (string.IsNullOrWhiteSpace(info.DataSource))
              throw new InvalidOperationException("Daemon gRPC smoke returned no data source.");

          Console.WriteLine(info.DataSource);
          "@ | Set-Content -Path $grpcSmokeProgram -Encoding UTF8

          & dotnet run --project $grpcSmokeProject --configuration Release -- 'http://127.0.0.1:5820'
          if ($LASTEXITCODE -ne 0) {
            throw "Daemon gRPC smoke client failed with exit code $LASTEXITCODE."
          }

          $process.Kill($true)
          $process.WaitForExit()

      - name: Upload daemon archive
        uses: actions/upload-artifact@v4
        with:
          name: daemon-${{ matrix.rid }}
          path: |
            artifacts/daemon-release/archives/*.zip
            artifacts/daemon-release/archives/*.tar.gz
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [publish-nuget, native-aot, daemon-archives]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download NuGet artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/nuget

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: artifacts/native
          merge-multiple: true

      - name: Download daemon artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: daemon-*
          path: artifacts/daemon
          merge-multiple: true

      - name: Generate daemon checksums
        shell: bash
        run: |
          set -euo pipefail
          cd artifacts/daemon
          sha256sum csharpdb-daemon-v* > SHA256SUMS.txt

      - name: Resolve release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f RELEASE_NOTES.md ]]; then
            notes_file="release-notes-current.md"
            awk '
              /^## / {
                if (started) exit
                started=1
              }
              started { print }
            ' RELEASE_NOTES.md > "$notes_file"

            if [[ -s "$notes_file" ]]; then
              echo "has_notes=true" >> "$GITHUB_OUTPUT"
              echo "path=$notes_file" >> "$GITHUB_OUTPUT"
            else
              echo "has_notes=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release (custom notes)
        if: steps.notes.outputs.has_notes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: CSharpDB v${{ needs.publish-nuget.outputs.version }}
          body_path: ${{ steps.notes.outputs.path }}
          files: |
            artifacts/nuget/*.nupkg
            artifacts/native/*
            artifacts/daemon/*

      - name: Create release (auto-generated notes)
        if: steps.notes.outputs.has_notes == 'false'
        uses: softprops/action-gh-release@v2
        with:
          name: CSharpDB v${{ needs.publish-nuget.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/nuget/*.nupkg
            artifacts/native/*
            artifacts/daemon/*
