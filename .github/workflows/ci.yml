name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Guard legacy primitives identity
        shell: pwsh
        run: ./scripts/Test-NoLegacyCoreReferences.ps1

      - name: Guard NuGet package dependency closure
        shell: pwsh
        run: ./scripts/Test-NuGetPackageClosure.ps1

      - name: Guard EF Core package version consistency
        shell: pwsh
        run: ./scripts/Test-EfCoreVersionConsistency.ps1

      - name: Validate public documentation
        shell: pwsh
        run: ./scripts/Test-Documentation.ps1

      - name: Restore
        run: dotnet restore CSharpDB.slnx

      - name: Build
        run: dotnet build CSharpDB.slnx -c Release --no-restore

      - name: Test smaller suites
        shell: bash
        run: |
          set -euo pipefail

          projects=(
            tests/CSharpDB.Admin.Reports.Tests/CSharpDB.Admin.Reports.Tests.csproj
            tests/CSharpDB.Admin.Forms.Tests/CSharpDB.Admin.Forms.Tests.csproj
            tests/CSharpDB.Api.Tests/CSharpDB.Api.Tests.csproj
            tests/CSharpDB.Cli.Tests/CSharpDB.Cli.Tests.csproj
            tests/CSharpDB.Daemon.Tests/CSharpDB.Daemon.Tests.csproj
            tests/CSharpDB.Data.Tests/CSharpDB.Data.Tests.csproj
            tests/CSharpDB.DevOps.Tests/CSharpDB.DevOps.Tests.csproj
            tests/CSharpDB.EntityFrameworkCore.Tests/CSharpDB.EntityFrameworkCore.Tests.csproj
            tests/CSharpDB.Pipelines.Tests/CSharpDB.Pipelines.Tests.csproj
          )

          for project in "${projects[@]}"; do
            echo "::group::dotnet test ${project}"
            dotnet test "${project}" -c Release --no-build --logger "console;verbosity=minimal"
            echo "::endgroup::"
          done

      - name: Test CSharpDB.Tests
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ runner.os }}" == "Linux" ]]; then
            dotnet test tests/CSharpDB.Tests/CSharpDB.Tests.csproj \
              -c Release \
              --no-build \
              --logger "console;verbosity=normal" \
              --blame-hang \
              --blame-hang-timeout 5m \
              -- \
              xUnit.ReporterSwitch=verbose \
              xUnit.DiagnosticMessages=true \
              xUnit.LongRunningTestSeconds=60
          else
            dotnet test tests/CSharpDB.Tests/CSharpDB.Tests.csproj \
              -c Release \
              --no-build \
              --logger "console;verbosity=normal" \
              -- \
              xUnit.ReporterSwitch=verbose
          fi

  native-aot:
    name: NativeAOT (${{ matrix.os }} ${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            lib: CSharpDB.Native.so
          - os: windows-latest
            rid: win-x64
            lib: CSharpDB.Native.dll
          - os: macos-latest
            rid: osx-arm64
            lib: CSharpDB.Native.dylib

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Install native toolchain (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Publish NativeAOT library
        run: dotnet publish src/CSharpDB.Native/CSharpDB.Native.csproj -c Release -r ${{ matrix.rid }}

      - name: Verify exported symbols (Linux)
        if: runner.os == 'Linux'
        run: nm -D src/CSharpDB.Native/bin/Release/net10.0/${{ matrix.rid }}/publish/${{ matrix.lib }} | grep -c csharpdb_

      - name: Verify exported symbols (macOS)
        if: runner.os == 'macOS'
        run: nm -gU src/CSharpDB.Native/bin/Release/net10.0/${{ matrix.rid }}/publish/${{ matrix.lib }} | grep -c csharpdb_

      - name: Verify exported symbols (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dumpbin = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
            -latest `
            -products * `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -find 'VC\Tools\MSVC\**\bin\Hostx64\x64\dumpbin.exe' |
            Select-Object -First 1

          if (-not $dumpbin) {
            throw "Could not locate dumpbin.exe from the installed Visual Studio toolchain."
          }

          & $dumpbin /exports src\CSharpDB.Native\bin\Release\net10.0\${{ matrix.rid }}\publish\${{ matrix.lib }} |
            Select-String "csharpdb_"

      - name: Upload native library
        uses: actions/upload-artifact@v7
        with:
          name: native-${{ matrix.rid }}
          path: src/CSharpDB.Native/bin/Release/net10.0/${{ matrix.rid }}/publish/${{ matrix.lib }}
          if-no-files-found: error

      - name: Upload C header (once)
        if: matrix.rid == 'linux-x64'
        uses: actions/upload-artifact@v7
        with:
          name: native-header
          path: src/CSharpDB.Native/csharpdb.h
          if-no-files-found: error

  pack:
    name: Pack and Qualify NuGet Artifacts
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json

      - name: Rewrite README links for NuGet
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/fix-nuget-readme-links.sh
          scripts/fix-nuget-readme-links.sh main \
            src/CSharpDB/README.md \
            src/CSharpDB.Primitives/README.md \
            src/CSharpDB.Sql/README.md \
            src/CSharpDB.Storage/README.md \
            src/CSharpDB.ImportExport/README.md \
            src/CSharpDB.Execution/README.md \
            src/CSharpDB.Storage.Diagnostics/README.md \
            src/CSharpDB.Engine/README.md \
            src/CSharpDB.Pipelines/README.md \
            src/CSharpDB.Generators/README.md \
            src/CSharpDB.Client/README.md \
            src/CSharpDB.CodeModules/README.md \
            src/CSharpDB.Data/README.md \
            src/CSharpDB.EntityFrameworkCore/README.md

      - name: Pack projects
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/nuget
          dotnet pack src/CSharpDB.Primitives/CSharpDB.Primitives.csproj -c Release -o artifacts/nuget
          dotnet pack src/CSharpDB.Sql/CSharpDB.Sql.csproj -c Release -o artifacts/nuget
          dotnet pack src/CSharpDB.Storage/CSharpDB.Storage.csproj -c Release -o artifacts/nuget
          dotnet pack src/CSharpDB.ImportExport/CSharpDB.ImportExport.csproj -c Release -o artifacts/nuget
          dotnet pack src/CSharpDB.Execution/CSharpDB.Execution.csproj -c Release -o artifacts/nuget
          dotnet pack src/CSharpDB.Storage.Diagnostics/CSharpDB.Storage.Diagnostics.csproj -c Release -o artifacts/nuget
          dotnet pack src/CSharpDB.Engine/CSharpDB.Engine.csproj -c Release -o artifacts/nuget
          dotnet pack src/CSharpDB.Pipelines/CSharpDB.Pipelines.csproj -c Release -o artifacts/nuget
          dotnet pack src/CSharpDB.Generators/CSharpDB.Generators.csproj -c Release -o artifacts/nuget
          dotnet pack src/CSharpDB.Client/CSharpDB.Client.csproj -c Release -o artifacts/nuget
          dotnet pack src/CSharpDB.CodeModules/CSharpDB.CodeModules.csproj -c Release -o artifacts/nuget
          dotnet pack src/CSharpDB.Data/CSharpDB.Data.csproj -c Release -o artifacts/nuget
          dotnet pack src/CSharpDB.EntityFrameworkCore/CSharpDB.EntityFrameworkCore.csproj -c Release -o artifacts/nuget
          dotnet pack src/CSharpDB/CSharpDB.csproj -c Release -o artifacts/nuget

      - name: Qualify packed EF Core provider
        shell: pwsh
        run: ./scripts/Test-EfCoreNuGetPackage.ps1 -FeedPath artifacts/nuget

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/nuget/*.nupkg
          if-no-files-found: error
